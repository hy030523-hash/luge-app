<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>루지 스타트 챔피언십 🛷</title>
    
    <!-- 폰트 및 꼬리바람(Tailwind) CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (호환성 버전) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .app-container { max-width: 448px; margin: 0 auto; background: white; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .hide { display: none !important; }
        .toast-enter { animation: slideDown 0.3s forwards; }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <!-- 알림창 (Toast) -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm font-bold shadow-lg z-50 hide">
        알림 메시지
    </div>

    <!-- 메인 앱 컨테이너 -->
    <div class="app-container" id="appBox">
        
        <!-- 헤더 영역 -->
        <header class="bg-blue-600 text-white p-5 rounded-b-2xl shadow-md relative">
            <h1 class="text-xl font-extrabold text-center tracking-tight">루지 스타트 챔피언십 🛷</h1>
            <p class="text-center text-blue-100 text-xs mt-1">실시간 스타트 랭킹 보드</p>
            <!-- 스태프 모드 진입 톱니바퀴 -->
            <button onclick="openStaffLogin()" class="absolute top-5 right-5 text-blue-200 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <!-- [화면 1] 참가자 랭킹 화면 -->
        <main id="rankingScreen" class="p-5">
            <!-- 랭킹 필터 -->
            <div id="filterArea" class="mb-4">
                <select id="schoolFilter" onchange="renderRankings()" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 font-bold outline-none">
                    <option value="ALL">🌍 전체 학교 보기</option>
                    <!-- 자바스크립트로 학교 목록 자동 생성 -->
                </select>
            </div>

            <!-- 랭킹 리스트 출력 영역 -->
            <ul id="rankingList" class="space-y-3">
                <!-- 랭킹 아이템 자동 생성 -->
            </ul>
        </main>

        <!-- [화면 2] 스태프 관리 화면 (기본 숨김) -->
        <main id="staffScreen" class="p-5 hide bg-gray-50 min-h-screen pb-20">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-extrabold text-red-600">🔴 스태프 관리 모드</h2>
                <button onclick="closeStaffMode()" class="text-sm bg-gray-200 px-3 py-1.5 rounded-lg font-bold text-gray-700 hover:bg-gray-300">랭킹으로 돌아가기</button>
            </div>

            <!-- 기록 입력 폼 -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-red-100 mb-6">
                <h3 class="font-bold text-gray-800 mb-4" id="formTitle">새로운 기록 입력</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">소속 학교명 (한글)</label>
                        <input type="text" id="inputSchool" placeholder="예: 한국체대" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent p-2.5 font-medium outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">참가자 이름</label>
                        <input type="text" id="inputName" placeholder="예: 김루지" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent p-2.5 font-medium outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">전화번호 (전체)</label>
                        <input type="tel" id="inputPhone" placeholder="예: 010-1234-5678" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent p-2.5 font-medium outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">측정 기록 (초)</label>
                        <div class="relative">
                            <input type="number" id="inputRecord" step="0.01" placeholder="예: 2.45" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent p-2.5 font-mono text-lg font-bold outline-none">
                            <span class="absolute right-4 top-3 text-gray-400 font-bold">초</span>
                        </div>
                    </div>
                    <button id="submitBtn" onclick="saveRecord()" class="w-full mt-2 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                        기록 서버에 등록하기
                    </button>
                    <button id="cancelEditBtn" onclick="cancelEdit()" class="w-full mt-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-lg transition-colors hide">
                        수정 취소
                    </button>
                </div>
            </div>

            <!-- 등록된 전체 기록 관리 리스트 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-100 p-3 border-b border-gray-200 flex justify-between items-center">
                    <span class="font-bold text-gray-700 text-sm">전체 기록 관리</span>
                    <select id="sortAdmin" onchange="renderAdminList()" class="bg-white border border-gray-300 text-xs rounded-md px-2 py-1 outline-none">
                        <option value="newest">최신 등록순</option>
                        <option value="fastest">기록 빠른순</option>
                        <option value="slowest">기록 느린순</option>
                    </select>
                </div>
                <ul id="adminList" class="divide-y divide-gray-100 max-h-80 overflow-y-auto">
                    <!-- 자바스크립트로 관리 리스트 자동 생성 -->
                </ul>
            </div>
        </main>

        <!-- 하단 네비게이션 탭 -->
        <nav id="bottomNav" class="fixed bottom-0 w-full max-w-[448px] bg-white border-t border-gray-200 flex text-center z-40">
            <button onclick="changeTab('individual')" id="tabIndiv" class="flex-1 py-4 text-blue-600 font-bold border-t-2 border-blue-600 bg-blue-50 transition-colors">
                👤 개인 랭킹
            </button>
            <button onclick="changeTab('school')" id="tabSchool" class="flex-1 py-4 text-gray-400 font-bold border-t-2 border-transparent hover:bg-gray-50 transition-colors">
                🏫 학교 대항전
            </button>
        </nav>
    </div>

    <!-- 스태프 비밀번호 입력 모달창 -->
    <div id="pwModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hide">
        <div class="bg-white rounded-xl p-6 w-80 shadow-2xl transform transition-all">
            <h3 class="text-lg font-bold text-gray-900 mb-2">스태프 권한 확인</h3>
            <p class="text-xs text-gray-500 mb-4">관리자 핀 번호 4자리를 입력하세요.</p>
            <input type="password" id="staffPw" placeholder="PIN 번호" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-center text-xl tracking-widest outline-none focus:ring-2 focus:ring-blue-500 mb-4" maxlength="4">
            <div class="flex gap-2">
                <button onclick="closePwModal()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-2 rounded-lg">취소</button>
                <button onclick="checkStaffPw()" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded-lg">확인</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. Firebase (파이어베이스) 설정 및 연동
        // (사용자님이 캡처해서 보여주신 바로 그 코드입니다!)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB8bp-0-lu2PN2i9GAmfE_64K9-e4_T6mA",
            authDomain: "mokup-site.firebaseapp.com",
            databaseURL: "https://mokup-site-default-rtdb.firebaseio.com",
            projectId: "mokup-site",
            storageBucket: "mokup-site.firebasestorage.app",
        };

        // Firebase 초기화
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 전역 변수
        let allRecords = [];
        let currentTab = 'individual'; 
        let editingDocId = null; // 수정 모드일 때 해당 데이터의 고유 ID 저장

        // ==========================================
        // 2. 실시간 데이터 가져오기 (핵심 로직)
        // ==========================================
        // Firestore에서 'records' 컬렉션의 변화를 실시간으로 감지
        db.collection("records").onSnapshot((snapshot) => {
            allRecords = []; // 기존 배열 비우기
            snapshot.forEach((doc) => {
                const data = doc.data();
                allRecords.push({
                    id: doc.id, // 문서 고유 ID (수정, 삭제 시 필요)
                    school: data.school,
                    name: data.name,
                    phone: data.phone,
                    record: parseFloat(data.record),
                    createdAt: data.createdAt ? data.createdAt.toMillis() : Date.now() // 정렬을 위한 시간
                });
            });
            
            // 데이터가 새로 들어오면 화면 다시 그리기
            updateSchoolFilter();
            renderRankings();
            renderAdminList();
        }, (error) => {
            console.error("Firestore 연결 에러: ", error);
            if (error.message.includes("has not been used") || error.code === "permission-denied") {
                showToast('에러: Firebase 콘솔에서 [데이터베이스 만들기]를 먼저 완료해주세요!', 'error');
            } else {
                showToast('데이터를 불러오는데 실패했습니다: ' + error.message, 'error');
            }
        });


        // ==========================================
        // 3. 스태프 데이터 입력 / 수정 / 삭제 로직
        // ==========================================
        function saveRecord() {
            const school = document.getElementById('inputSchool').value.trim();
            const name = document.getElementById('inputName').value.trim();
            const phone = document.getElementById('inputPhone').value.trim();
            const record = parseFloat(document.getElementById('inputRecord').value);

            if (!school || !name || isNaN(record)) {
                showToast('학교, 이름, 기록은 필수 입력입니다!', 'error');
                return;
            }

            const recordData = {
                school: school,
                name: name,
                phone: phone,
                record: record,
            };

            if (editingDocId) {
                // [수정 모드] 기존 문서 업데이트
                db.collection("records").doc(editingDocId).update(recordData)
                .then(() => {
                    showToast('기록이 수정되었습니다.', 'success');
                    cancelEdit(); // 수정 모드 종료
                })
                .catch(error => showToast('오류 발생: ' + error.message, 'error'));
            } else {
                // [신규 모드] 새 문서 추가 (생성 시간 포함)
                recordData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection("records").add(recordData)
                .then(() => {
                    showToast('새로운 기록이 서버에 등록되었습니다!', 'success');
                    clearInputForm();
                })
                .catch(error => showToast('오류 발생: ' + error.message, 'error'));
            }
        }

        function deleteRecord(docId) {
            if (confirm('정말로 이 기록을 완전히 삭제하시겠습니까? (복구 불가)')) {
                db.collection("records").doc(docId).delete()
                .then(() => showToast('기록이 삭제되었습니다.', 'success'))
                .catch(error => showToast('삭제 오류: ' + error.message, 'error'));
            }
        }

        function editRecord(docId) {
            // 수정할 데이터 찾기
            const item = allRecords.find(r => r.id === docId);
            if (!item) return;

            // 폼에 값 채워넣기
            document.getElementById('inputSchool').value = item.school;
            document.getElementById('inputName').value = item.name;
            document.getElementById('inputPhone').value = item.phone || '';
            document.getElementById('inputRecord').value = item.record;

            // UI 변경 (수정 모드)
            editingDocId = docId;
            document.getElementById('formTitle').innerText = '기록 수정 중...';
            document.getElementById('formTitle').className = 'font-bold text-yellow-600 mb-4';
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = '수정한 내용 덮어쓰기';
            btn.className = 'w-full mt-2 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-lg transition-colors';
            
            document.getElementById('cancelEditBtn').classList.remove('hide');

            // 화면 위로 스크롤
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingDocId = null;
            clearInputForm();
            
            // UI 복구
            document.getElementById('formTitle').innerText = '새로운 기록 입력';
            document.getElementById('formTitle').className = 'font-bold text-gray-800 mb-4';
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = '기록 서버에 등록하기';
            btn.className = 'w-full mt-2 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-colors';
            
            document.getElementById('cancelEditBtn').classList.add('hide');
        }

        function clearInputForm() {
            document.getElementById('inputSchool').value = '';
            document.getElementById('inputName').value = '';
            document.getElementById('inputPhone').value = '';
            document.getElementById('inputRecord').value = '';
        }


        // ==========================================
        // 4. 화면 그리기 (렌더링) 로직
        // ==========================================
        
        // 필터 옵션 업데이트 (중복 학교 제거)
        function updateSchoolFilter() {
            const filterSelect = document.getElementById('schoolFilter');
            const currentSelection = filterSelect.value;
            
            const uniqueSchools = [...new Set(allRecords.map(item => item.school))].sort();
            
            filterSelect.innerHTML = '<option value="ALL">🌍 전체 학교 보기</option>';
            uniqueSchools.forEach(school => {
                filterSelect.innerHTML += `<option value="${school}">${school}</option>`;
            });

            // 기존 선택 유지 (없으면 ALL)
            if (uniqueSchools.includes(currentSelection)) {
                filterSelect.value = currentSelection;
            } else {
                filterSelect.value = "ALL";
            }
        }

        // 참가자 화면 - 랭킹 리스트 그리기
        function renderRankings() {
            const list = document.getElementById('rankingList');
            const filter = document.getElementById('schoolFilter').value;
            list.innerHTML = '';

            if (allRecords.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-400">아직 등록된 기록이 없습니다.<br>첫 번째 도전자가 되어보세요!</div>';
                return;
            }

            if (currentTab === 'individual') {
                // 개인 랭킹 (필터 적용 후 빠른 순 정렬)
                let displayData = allRecords;
                if (filter !== 'ALL') {
                    displayData = allRecords.filter(item => item.school === filter);
                }
                
                // 기록 오름차순(빠른 순) 정렬
                displayData.sort((a, b) => a.record - b.record);

                displayData.forEach((item, index) => {
                    let medal = '';
                    if (index === 0) medal = '🥇';
                    else if (index === 1) medal = '🥈';
                    else if (index === 2) medal = '🥉';
                    else medal = `<span class="text-gray-400 text-sm w-5 inline-block text-center">${index + 1}</span>`;

                    const rankStyle = index < 3 ? 'bg-white border-2 border-blue-400 shadow-md' : 'bg-white border border-gray-200';
                    const nameStyle = index < 3 ? 'text-blue-700 font-extrabold text-lg' : 'text-gray-700 font-bold';

                    list.innerHTML += `
                        <li class="${rankStyle} rounded-xl p-4 flex items-center justify-between mb-3 transform transition-all hover:scale-[1.02]">
                            <div class="flex items-center gap-3">
                                <div class="text-xl font-bold">${medal}</div>
                                <div>
                                    <div class="${nameStyle}">${item.name}</div>
                                    <div class="text-xs text-gray-500 font-medium">${item.school}</div>
                                </div>
                            </div>
                            <div class="text-xl font-black font-mono text-gray-800 tracking-tight">
                                ${item.record.toFixed(2)}<span class="text-sm font-bold text-gray-500 ml-1">초</span>
                            </div>
                        </li>
                    `;
                });
            } else {
                // 학교 대항전 (평균 기록 계산)
                const schoolStats = {};
                allRecords.forEach(item => {
                    if (!schoolStats[item.school]) {
                        schoolStats[item.school] = { totalRecord: 0, count: 0 };
                    }
                    schoolStats[item.school].totalRecord += item.record;
                    schoolStats[item.school].count += 1;
                });

                const averageData = [];
                for (const school in schoolStats) {
                    const avg = schoolStats[school].totalRecord / schoolStats[school].count;
                    averageData.push({ school: school, average: avg, count: schoolStats[school].count });
                }

                // 평균 기록 오름차순(빠른 순) 정렬
                averageData.sort((a, b) => a.average - b.average);

                averageData.forEach((item, index) => {
                    let medal = index === 0 ? '🏆' : `<span class="text-gray-400 text-sm w-5 inline-block text-center">${index + 1}</span>`;
                    const rankStyle = index === 0 ? 'bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 shadow-sm' : 'bg-white border border-gray-200';
                    
                    list.innerHTML += `
                        <li class="${rankStyle} rounded-xl p-4 flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="text-xl font-bold">${medal}</div>
                                <div>
                                    <div class="text-gray-800 font-extrabold text-lg">${item.school}</div>
                                    <div class="text-xs text-blue-500 font-bold">참가자 ${item.count}명</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-gray-400 mb-1">평균 기록</div>
                                <div class="text-xl font-black font-mono text-indigo-600 tracking-tight">
                                    ${item.average.toFixed(2)}<span class="text-sm font-bold text-indigo-400 ml-1">초</span>
                                </div>
                            </div>
                        </li>
                    `;
                });
            }
        }

        // 스태프 관리 리스트 그리기
        function renderAdminList() {
            const list = document.getElementById('adminList');
            const sortType = document.getElementById('sortAdmin').value;
            list.innerHTML = '';

            if (allRecords.length === 0) {
                list.innerHTML = '<li class="p-4 text-center text-xs text-gray-400">데이터가 없습니다.</li>';
                return;
            }

            // 원본 데이터 복사 후 정렬 수행
            let displayData = [...allRecords];
            
            if (sortType === 'newest') {
                displayData.sort((a, b) => b.createdAt - a.createdAt); // 최신순 (시간 내림차순)
            } else if (sortType === 'fastest') {
                displayData.sort((a, b) => a.record - b.record); // 빠른순 (기록 오름차순)
            } else if (sortType === 'slowest') {
                displayData.sort((a, b) => b.record - a.record); // 느린순 (기록 내림차순)
            }

            displayData.forEach(item => {
                // 전화번호 마스킹 (뒷 4자리)
                const shortPhone = item.phone ? item.phone.slice(-4) : '없음';
                const isEditing = (editingDocId === item.id);
                const bgClass = isEditing ? 'bg-yellow-50' : 'hover:bg-gray-50';
                
                list.innerHTML += `
                    <li class="p-3.5 flex justify-between items-center ${bgClass} transition-colors">
                        <div class="flex flex-col">
                            <span class="font-bold text-gray-800 text-sm">
                                ${item.name} <span class="text-xs text-gray-400 font-normal ml-1">(${shortPhone})</span> 
                                <span class="text-xs text-gray-500 font-normal ml-1 bg-gray-200 px-1.5 py-0.5 rounded-sm">${item.school}</span>
                            </span>
                            <span class="text-red-500 font-mono font-bold text-sm mt-0.5">${item.record.toFixed(2)}초</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editRecord('${item.id}')" class="px-3 py-1.5 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg hover:bg-blue-100 transition-colors">수정</button>
                            <button onclick="deleteRecord('${item.id}')" class="px-3 py-1.5 bg-red-50 text-red-600 text-xs font-bold rounded-lg hover:bg-red-100 transition-colors">삭제</button>
                        </div>
                    </li>
                `;
            });
        }

        // ==========================================
        // 5. UI 토글 및 기타 기능
        // ==========================================
        
        function changeTab(tabName) {
            currentTab = tabName;
            const filterArea = document.getElementById('filterArea');
            const tabIndiv = document.getElementById('tabIndiv');
            const tabSchool = document.getElementById('tabSchool');

            if (tabName === 'individual') {
                filterArea.classList.remove('hide');
                tabIndiv.className = "flex-1 py-4 text-blue-600 font-bold border-t-2 border-blue-600 bg-blue-50 transition-colors";
                tabSchool.className = "flex-1 py-4 text-gray-400 font-bold border-t-2 border-transparent hover:bg-gray-50 transition-colors";
            } else {
                filterArea.classList.add('hide');
                tabSchool.className = "flex-1 py-4 text-blue-600 font-bold border-t-2 border-blue-600 bg-blue-50 transition-colors";
                tabIndiv.className = "flex-1 py-4 text-gray-400 font-bold border-t-2 border-transparent hover:bg-gray-50 transition-colors";
            }
            renderRankings();
        }

        function openStaffLogin() {
            document.getElementById('pwModal').classList.remove('hide');
            document.getElementById('staffPw').value = '';
            document.getElementById('staffPw').focus();
        }

        function closePwModal() {
            document.getElementById('pwModal').classList.add('hide');
        }

        function checkStaffPw() {
            const pw = document.getElementById('staffPw').value;
            if (pw === '9999') {
                closePwModal();
                document.getElementById('rankingScreen').classList.add('hide');
                document.getElementById('bottomNav').classList.add('hide');
                document.getElementById('staffScreen').classList.remove('hide');
                showToast('스태프 모드에 진입했습니다.', 'success');
            } else {
                showToast('비밀번호가 틀렸습니다.', 'error');
            }
        }

        function closeStaffMode() {
            if(editingDocId) cancelEdit(); // 수정 중 나갈 때 초기화
            document.getElementById('staffScreen').classList.add('hide');
            document.getElementById('rankingScreen').classList.remove('hide');
            document.getElementById('bottomNav').classList.remove('hide');
        }

        // 예쁜 알림창(Toast) 띄우기
        let toastTimeout;
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            
            if (type === 'error') {
                toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full text-sm font-bold shadow-lg z-50 toast-enter';
            } else {
                toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm font-bold shadow-lg z-50 toast-enter';
            }
            
            toast.classList.remove('hide');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('hide');
            }, 3000);
        }
        
    </script>
</body>
</html>
